name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build + vet + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  integration:
    name: integration tests (+ RLS backstop)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Migrations + the bulk of the integration tests run as the owner/superuser (the tests call the
      # application services directly, bypassing the request middleware that pins RLS GUCs). The
      # dedicated RLS test (internal/platform/db) derives the non-superuser DSN from this one.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
      OIKUMENEA_TEST_DSN: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: ariga/setup-atlas@v0
      - name: Apply migrations (as owner/superuser)
        run: atlas migrate apply --env local
      - name: Create the non-superuser application login role (RLS backstop)
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "CREATE ROLE oikumenea LOGIN PASSWORD 'dev' IN ROLE oikumenea_app;"
      - name: Integration tests
        run: go test -tags integration ./...
