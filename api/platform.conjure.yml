# Platform operational API (M0 walking skeleton).
#
# Owns no domain endpoints (per docs/modules/platform.md); this declares the operational
# surfaces plus one deliberate error path that exercises the Conjure -> SerializableError
# mapping (M0 exit criterion). Generated Go lands in internal/conjure and is never hand-edited.
types:
  definitions:
    default-package: oikumenea.platform
    objects:
      # The composed URN resource identifier (D-ResourceIdentifiers). Every Object/Link/Action
      # reference carries the full RID, never a bare uuid. Defined here so the alias exists from
      # M0; domain modules reuse it.
      Rid:
        alias: string
      VersionInfo:
        docs: Binary and schema revision the running server reports.
        fields:
          binaryRevision: string
          schemaRevision: string
    errors:
      DemoError:
        docs: |
          A deliberately-returned error used by GET /demo/error to prove the
          werror -> Conjure SerializableError path end to end. Not a real domain error.
        namespace: Platform
        code: INVALID_ARGUMENT
        safe-args:
          reason: string
services:
  PlatformOpsService:
    name: Platform Ops Service
    package: oikumenea.platform
    base-path: /platform/v1
    docs: Unauthenticated operational endpoints owned by the platform module.
    endpoints:
      version:
        http: GET /status/version
        returns: VersionInfo
        docs: Report the binary + applied schema revision.
      demoError:
        http: GET /demo/error
        docs: Always returns Platform:DemoError (M0 SerializableError smoke test).
