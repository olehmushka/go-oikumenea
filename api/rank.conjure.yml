# Rank module API (M4 + M15). The single, system-wide rank scheme (L-OneRankScheme / D-Rank /
# D-RankSystems / docs/modules/rank.md): a rank system at the top (a national/organizational ladder —
# one scheme may hold several at once for a coalition directory), a rank category within each system, a
# TREE of rank types within each category, and ranks on the leaf types — strict containment. A rank
# carries an optional standardized grade (NATO STANAG 2116) for CROSS-system comparability. A rank is a
# DIRECTORY attribute describing seniority and grants NO authorization (the PDP never reads it). There is
# exactly one scheme per deployment, edited only by the instance admin; a full system subtree can be
# bootstrapped from an opt-in preset via POST /rank-scheme/import.
#
# RID-bearing fields are typed `string` (the composed URN RID): Conjure reserves `rid` as a built-in
# primitive whose `ri.` format is NOT our `urn:oikumenea:` RID, so a type named `Rid`/`rid` cannot be
# used. Localized `name` is returned as an inline map<string,string> (locale->text), all enabled
# locales, NO Accept-Language negotiation (D-i18n); the owning module assembles it from its
# default-locale `name` column + the localization store. Generated Go lands in internal/conjure and
# is never hand-edited.
#
# Endpoints declare `auth: header` so the contract carries the bearer token from now on; reads gate
# on `rank.scheme.read` and writes are instance-scope (`rank.scheme.manage`) — both enforced once
# authorization (M7) + identity-federation (M8) land. Writes are recorded in the audit log in-process
# (D-Audit), under an interim `system` actor until the acting person can be resolved (M7/M8).
types:
  definitions:
    default-package: oikumenea.rank
    objects:
      Rank:
        docs: A specific grade within a type (e.g. sergeant, associate_professor), ordered for exact seniority.
        fields:
          id:
            type: string
            docs: The rank's URN RID (carried as a plain string).
          code:
            type: string
            docs: Stable, locale-agnostic identifier (D-Code); unique within its type among active ranks.
          name:
            type: map<string, string>
            docs: locale->text display name (all enabled locales; default-locale fallback + i18n store).
          abbreviation:
            type: optional<string>
            docs: Optional short form (e.g. SGT); locale-agnostic.
          gradeCode:
            type: optional<string>
            docs: |
              Optional standardized cross-system grade (NATO STANAG 2116; one of the GET /rank-grades
              codes). Two ranks are equivalent across systems when they share a gradeCode; absent => no
              cross-system comparison.
          sortOrder:
            type: integer
            docs: Seniority ordinal among active siblings within the type (lower = more junior).
          systemId:
            type: string
            docs: The URN RID of the owning rank system (denormalized; equals the type's system).
          typeId:
            type: string
            docs: The URN RID of the owning rank type.
      RankType:
        docs: |
          A band within a category (e.g. officers, warrant, enlisted), ordered. Types form a TREE: a
          type may nest under another type of the same category (parentTypeId), and ranks attach to
          LEAF types only.
        fields:
          id:
            type: string
            docs: The type's URN RID (carried as a plain string).
          code:
            type: string
            docs: Stable, locale-agnostic identifier; unique among active siblings (same category + parent).
          name:
            type: map<string, string>
            docs: locale->text display name.
          sortOrder:
            type: integer
            docs: Seniority ordinal among active siblings (within the parent type, or the category for a root type).
          systemId:
            type: string
            docs: The URN RID of the owning rank system (denormalized; equals the category's system).
          categoryId:
            type: string
            docs: The URN RID of the owning rank category (the root category; carried on every type in the tree).
          parentTypeId:
            type: optional<string>
            docs: The URN RID of the parent type; absent for a root type of the category.
          children:
            type: list<RankType>
            docs: Child types in seniority order. Populated by getRankScheme; empty for a leaf type and on create/update.
          ranks:
            type: list<Rank>
            docs: The type's ranks in seniority order (leaf types only). Populated by getRankScheme; empty on create/update of the type.
      RankCategory:
        docs: A branch within a rank system (e.g. army, navy; or academic, administrative), ordered.
        fields:
          id:
            type: string
            docs: The category's URN RID (carried as a plain string).
          code:
            type: string
            docs: Stable, locale-agnostic identifier; unique among active categories within the system.
          name:
            type: map<string, string>
            docs: locale->text display name.
          sortOrder:
            type: integer
            docs: Seniority ordinal among active categories of the system.
          systemId:
            type: string
            docs: The URN RID of the owning rank system.
          types:
            type: list<RankType>
            docs: The category's types in seniority order. Populated by getRankScheme; empty on create/update of the category.
      RankSystem:
        docs: |
          The top level of the scheme (D-RankSystems): a national/organizational rank ladder. One scheme
          may hold several at once (a coalition directory); a single-nation deployment has one.
        fields:
          id:
            type: string
            docs: The system's URN RID (carried as a plain string).
          code:
            type: string
            docs: Stable, locale-agnostic identifier (e.g. us-armed-forces); unique among active systems.
          name:
            type: map<string, string>
            docs: locale->text display name.
          sortOrder:
            type: integer
            docs: Order among active systems.
          country:
            type: optional<string>
            docs: ISO-3166 national origin (geo_countries code); absent for a supranational system (NATO/UN).
          categories:
            type: list<RankCategory>
            docs: The system's categories in seniority order. Populated by getRankScheme; empty on create/update of the system.
      RankGrade:
        docs: |
          A standardized cross-system comparability node (NATO STANAG 2116): the seeded reference catalog
          two ranks compare through. Equivalence = same code; seniority = tier then ordinal.
        fields:
          code:
            type: string
            docs: STANAG 2116 grade code (e.g. OF-5, OR-9, OF(D)).
          tier:
            type: string
            docs: One of officer | warrant | enlisted (enlisted < warrant < officer for cross-tier seniority).
          ordinal:
            type: integer
            docs: Order within the tier (junior -> senior).
          name:
            type: string
            docs: Generic, nation-neutral grade label (not translatable; grades are reference data, not i18n entities).
      RankScheme:
        docs: The whole scheme, systems -> categories -> types -> ranks, each level in seniority order.
        fields:
          systems: list<RankSystem>
      AddSystemRequest:
        docs: Add a rank system (the top level). `name` is the default-locale text; other locales via LocalizationService.
        fields:
          code: string
          name: string
          country:
            type: optional<string>
            docs: ISO-3166 national origin (geo_countries code); omit for a supranational system (NATO/UN).
          sortOrder:
            type: optional<integer>
            docs: Order among active systems; defaults to appended last.
      UpdateSystemRequest:
        docs: Edit/reorder a system. Omitted fields are unchanged. `code` is immutable; `country` cannot be cleared (open seam).
        fields:
          name: optional<string>
          country: optional<string>
          sortOrder: optional<integer>
      AddCategoryRequest:
        docs: Add a category under a system. `name` is the default-locale text; other locales via LocalizationService.
        fields:
          systemId:
            type: string
            docs: The URN RID of the owning (active) rank system.
          code: string
          name: string
          sortOrder:
            type: optional<integer>
            docs: Seniority ordinal; defaults to (max active sibling order + 1), i.e. appended last.
      UpdateCategoryRequest:
        docs: Edit/reorder a category. Omitted fields are unchanged. `code` is immutable by convention.
        fields:
          name: optional<string>
          sortOrder: optional<integer>
      AddTypeRequest:
        docs: |
          Add a type, rooted either directly under a category (categoryId) or nested under a parent
          type (parentTypeId — it then inherits the parent's category). Supply exactly one; a parent
          type that already holds ranks cannot gain child types (ranks live on leaf types only).
        fields:
          categoryId:
            type: optional<string>
            docs: The URN RID of the owning (active) category, for a root type. Omit when nesting under a parent type.
          parentTypeId:
            type: optional<string>
            docs: The URN RID of the owning (active) parent type, for a nested type. Omit for a root type.
          code: string
          name: string
          sortOrder:
            type: optional<integer>
            docs: Seniority ordinal; defaults to appended last among the new type's active siblings.
      UpdateTypeRequest:
        docs: Edit/reorder a type. Omitted fields are unchanged. `code` is immutable.
        fields:
          name: optional<string>
          sortOrder: optional<integer>
      AddRankRequest:
        docs: Add a rank under a (leaf) type.
        fields:
          typeId:
            type: string
            docs: The URN RID of the owning (active) type.
          code: string
          name: string
          abbreviation: optional<string>
          gradeCode:
            type: optional<string>
            docs: Optional standardized cross-system grade (a GET /rank-grades code); validated on write.
          sortOrder:
            type: optional<integer>
            docs: Seniority ordinal; defaults to appended last within the type.
      UpdateRankRequest:
        docs: Edit/reorder a rank. Omitted fields are unchanged. `code` is immutable; `gradeCode` cannot be cleared (open seam).
        fields:
          name: optional<string>
          abbreviation: optional<string>
          gradeCode: optional<string>
          sortOrder: optional<integer>
      ImportRankSchemeRequest:
        docs: |
          A preset rank-system subtree to import (D-RankSystems): one system with its categories ->
          types (a tree) -> ranks, each carrying a stable `code`. Applied as a code-keyed idempotent
          upsert in one transaction (additive; never deletes).
        fields:
          system: ImportSystem
      ImportSystem:
        fields:
          code: string
          name: string
          country: optional<string>
          sortOrder: optional<integer>
          categories: list<ImportCategory>
      ImportCategory:
        fields:
          code: string
          name: string
          sortOrder: optional<integer>
          types: list<ImportType>
      ImportType:
        docs: A type node; carry EITHER children OR ranks (ranks live on leaf types only).
        fields:
          code: string
          name: string
          sortOrder: optional<integer>
          children:
            type: list<ImportType>
            docs: Nested child types; empty for a leaf type.
          ranks:
            type: list<ImportRank>
            docs: Ranks on this (leaf) type; empty for a non-leaf type.
      ImportRank:
        fields:
          code: string
          name: string
          abbreviation: optional<string>
          gradeCode: optional<string>
          sortOrder: optional<integer>
      ImportRankSchemeResponse:
        docs: How many scheme nodes the import created, updated, or skipped (already current).
        fields:
          created: integer
          updated: integer
          skipped: integer
    errors:
      RankSystemNotFound:
        namespace: Rank
        code: NOT_FOUND
        safe-args:
          systemId: string
      RankCategoryNotFound:
        namespace: Rank
        code: NOT_FOUND
        safe-args:
          categoryId: string
      RankTypeNotFound:
        namespace: Rank
        code: NOT_FOUND
        safe-args:
          typeId: string
      RankNotFound:
        namespace: Rank
        code: NOT_FOUND
        safe-args:
          rankId: string
      RankCodeConflict:
        docs: A scheme node with this code already exists at this level within its parent.
        namespace: Rank
        code: CONFLICT
        safe-args:
          level: string
          code: string
      RankInvalid:
        docs: The node's code or name is malformed, or the request (e.g. an unknown delete level) is invalid.
        namespace: Rank
        code: INVALID_ARGUMENT
        safe-args:
          reason: string
      RankInUse:
        docs: The scheme node cannot be deleted while it is in use (has active children, or — post-M5 — is held by a person).
        namespace: Rank
        code: FAILED_PRECONDITION
        safe-args:
          reason: string
services:
  RankService:
    name: Rank Service
    package: oikumenea.rank
    base-path: /rank/v1
    default-auth: header
    docs: |
      The single system-wide rank scheme (L-OneRankScheme / D-Rank). Reads gate on
      `rank.scheme.read` (bundled in the unit-reader base role); writes are instance-scope
      (`rank.scheme.manage`) — both enforced once authorization lands (M7). Writes are audited
      in-process (D-Audit). Rank is a directory attribute and never an authorization input.
    endpoints:
      getRankScheme:
        http: GET /rank-scheme
        docs: Read the whole scheme (systems -> categories -> types -> ranks) in seniority order.
        returns: RankScheme
      getRankGrades:
        http: GET /rank-grades
        docs: Read the standardized-grade comparator catalog (NATO STANAG 2116), ordered by tier then ordinal.
        returns: list<RankGrade>
      addSystem:
        http: POST /rank-scheme/systems
        docs: Add a rank system. Returns Rank:RankCodeConflict if the code is taken among active systems.
        args:
          request: AddSystemRequest
        returns: RankSystem
      updateSystem:
        http: PUT /rank-scheme/systems/{systemId}
        docs: Edit/reorder a system. `code` is immutable by convention.
        args:
          systemId:
            type: string
            param-type: path
          request: UpdateSystemRequest
        returns: RankSystem
      importRankScheme:
        http: POST /rank-scheme/import
        docs: |
          Import a preset rank-system subtree (system -> categories -> types -> ranks) as a code-keyed
          idempotent upsert in one transaction (additive; never deletes). Returns a created/updated/
          skipped summary. Re-importing an unchanged preset reports all-skipped.
        args:
          request: ImportRankSchemeRequest
        returns: ImportRankSchemeResponse
      addCategory:
        http: POST /rank-scheme/categories
        docs: |
          Add a category under a system (systemId). Returns Rank:RankSystemNotFound if the system is
          absent, or Rank:RankCodeConflict if the code is taken among the system's active categories.
        args:
          request: AddCategoryRequest
        returns: RankCategory
      updateCategory:
        http: PUT /rank-scheme/categories/{categoryId}
        docs: Edit/reorder a category. `code` is immutable by convention.
        args:
          categoryId:
            type: string
            param-type: path
          request: UpdateCategoryRequest
        returns: RankCategory
      addType:
        http: POST /rank-scheme/types
        docs: |
          Add a type under a category (categoryId) or nested under a parent type (parentTypeId).
          Returns Rank:RankCategoryNotFound or Rank:RankTypeNotFound if the named parent is absent,
          or Rank:RankInvalid if the parent type already holds ranks (leaf types only).
        args:
          request: AddTypeRequest
        returns: RankType
      updateType:
        http: PUT /rank-scheme/types/{typeId}
        docs: Edit/reorder a type. `code` is immutable.
        args:
          typeId:
            type: string
            param-type: path
          request: UpdateTypeRequest
        returns: RankType
      addRank:
        http: POST /rank-scheme/ranks
        docs: Add a rank under a type. Returns Rank:RankTypeNotFound if the parent is absent.
        args:
          request: AddRankRequest
        returns: Rank
      updateRank:
        http: PUT /rank-scheme/ranks/{rankId}
        docs: Edit/reorder a rank. `code` is immutable.
        args:
          rankId:
            type: string
            param-type: path
          request: UpdateRankRequest
        returns: Rank
      deleteNode:
        http: DELETE /rank-scheme/{level}/{nodeId}
        docs: |
          Soft-delete a scheme node, blocked if in use (a system with active categories, a category with
          active types, a type with active ranks or child types, or — post-M5 — a rank held by a person).
          `level` is one of system | category | type | rank.
        args:
          level:
            type: string
            param-type: path
            docs: The scheme level to delete; one of system | category | type | rank.
          nodeId:
            type: string
            param-type: path
