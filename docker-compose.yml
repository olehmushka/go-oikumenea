# Production-shaped packaging for go-oikumenea (M11). Brings up Postgres, applies migrations as the
# owner/superuser, provisions the non-superuser application login role, then starts the server (which
# connects as that role so the RLS backstop is in force — D-RLSDefenseInDepth).
#
#   docker compose up --build
#   curl -k https://localhost:8444/status/readiness
#
# This is a runnable reference, not a hardened deployment: every secret here is an INSECURE local
# default (DB passwords, signing/crypto keys, bootstrap admin). Replace them (and supply ECV-encrypted
# config) for any real deployment. The operator owns the database (L-OperatorDB).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - oik-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Apply versioned migrations as the owner/superuser (migrations create the role + RLS policies and
  # must not be subject to them). Runs once, to completion.
  migrate:
    image: arigaio/atlas:latest
    depends_on:
      postgres:
        condition: service_healthy
    command: >-
      migrate apply
      --url "postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable"
      --dir "file:///migrations"
    volumes:
      - ./migrations:/migrations:ro

  # Provision the non-superuser application LOGIN role as a member of the oikumenea_app group role the
  # migration created. Idempotent; runs once after migrations.
  init-role:
    image: postgres:16
    depends_on:
      migrate:
        condition: service_completed_successfully
    entrypoint: ["sh", "-c"]
    command:
      - |
        psql "postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable" -v ON_ERROR_STOP=1 -c "
          DO \$\$ BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'oikumenea') THEN
              CREATE ROLE oikumenea LOGIN PASSWORD 'oikumenea' IN ROLE oikumenea_app;
            END IF;
          END \$\$;"

  app:
    build: .
    depends_on:
      init-role:
        condition: service_completed_successfully
    volumes:
      - ./deploy/install.docker.yml:/app/var/conf/install.yml:ro
    ports:
      - "8443:8443"
      - "8444:8444"

  # OPTIONAL admin console (D-WebUI). Opt-in only: it starts only with `--profile ui`, so a
  # default `docker compose up` is unchanged (no 8445). It is a pure API consumer (BFF) — the
  # `app` service is untouched. The IdP is external: point AUTH_KEYCLOAK_ISSUER at a Keycloak
  # reachable from BOTH the browser and this container (this prod compose ships no Keycloak —
  # for an all-in-one local demo, run the UI from the host: see web/README.md).
  #
  #   docker compose --profile ui up --build
  #   open http://localhost:8445
  web:
    build: ./web
    profiles: ["ui"]
    depends_on:
      - app
    ports:
      - "8445:3000"
    environment:
      # The BFF target. The app serves self-signed TLS, so let the Node server trust it (dev).
      API_BASE_URL: "https://app:8443"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      # Auth.js — replace the secret for any real use (openssl rand -base64 32).
      AUTH_SECRET: "dev-only-change-me-please-0000000000000000000="
      AUTH_URL: "http://localhost:8445"
      AUTH_TRUST_HOST: "true"
      # Keycloak confidential client (oikumenea-web). Issuer must be reachable from browser AND
      # this container, and must match the token `iss` exactly.
      AUTH_KEYCLOAK_ID: "oikumenea-web"
      AUTH_KEYCLOAK_SECRET: "dev-oikumenea-web-secret"
      AUTH_KEYCLOAK_ISSUER: "http://localhost:8080/realms/oikumenea"

volumes:
  oik-pgdata:
